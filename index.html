<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Intro section with dropdown navigation</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="background hidden"></div>
    <div class="contaier">
      <header class="header">
        <nav class="nav">
          <img src="images/logo.svg" alt="Snap logo" />
          <button class="menu" type="button">
            <img src="images/icon-menu.svg" alt="Menu icon" />
          </button>
          <div class="desk-nav hidden">
            <button type="button" class="close-menu">
              <img src="images/icon-close-menu.svg" alt="Close menu" />
            </button>
            <div class="nav-text">
              <div class="desk-feature-container submenu">
                <p class="desk-feature">
                  Features
                  <img src="images/icon-arrow-down.svg" alt="icon down" />
                </p>

                <div class="feature-context not-visible">
                  <p>
                    <img src="images/icon-todo.svg" alt="todo icon" />Todo List
                  </p>
                  <p>
                    <img
                      src="images/icon-calendar.svg"
                      alt="calendar icon"
                    />Calendar
                  </p>
                  <p>
                    <img
                      src="images/icon-reminders.svg"
                      alt="reminder icon"
                    />Reminders
                  </p>
                  <p>
                    <img
                      src="images/icon-planning.svg"
                      alt="planning icon"
                    />Planning
                  </p>
                </div>
              </div>

              <div class="desk-company-container submenu">
                <p class="desk-company">
                  Company
                  <img src="images/icon-arrow-down.svg" alt="icon down" />
                </p>
                <div class="company-context not-visible">
                  <p>History</p>
                  <p>Out Team</p>
                  <p>Blog</p>
                </div>
              </div>

              <p class="desk-careers">Carrers</p>
              <p class="desk-about">About</p>
            </div>

            <div class="nav-login">
              <button type="button" class="login">Login</button>
              <button type="button" class="register">Register</button>
            </div>
          </div>
        </nav>
      </header>

      <main class="main">
        <div class="hero-img">
          <picture>
            <source
              media="(min-width:1440px )"
              srcset="images/image-hero-desktop.png"
            />
            <img
              src="images/image-hero-mobile.png"
              alt="Photo of the young guy with laptop"
            />
          </picture>
        </div>
        <div class="hero-content">
          <div class="content-text">
            <h1><span>Make</span> remote work</h1>
            <p>
              Get your team in sync, no matter your location. Streamline
              processes, create team rituals, and watch productivity soar.
            </p>

            <button type="button">Learn more</button>
          </div>

          <div class="content-logos">
            <img src="images/client-databiz.svg" alt="logo of databiz" />
            <img src="images/client-audiophile.svg" alt="logo of audiophile" />
            <img src="images/client-meet.svg" alt="logo of meet" />
            <img src="images/client-maker.svg" alt="logo of maker" />
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
